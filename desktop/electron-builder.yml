# MV SQL NLP — configuración del instalador profesional (electron-builder)
appId: com.mvsql.nlp
productName: MV SQL NLP
copyright: © 2026 MV SQL NLP

directories:
  output: release
  buildResources: build

files:
  - dist/**
  - electron/**
  - package.json

asarUnpack:
  - "**/node_modules/better-sqlite3/**"

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
    - target: zip
      arch: [x64]
  icon: build/icon.ico
  # nsis y portable producen ambos un .exe: si comparten el mismo nombre,
  # el segundo "pisa" al primero en el Release de GitHub y esa operación
  # de reemplazo se puede colgar (timeout). Nombres distintos por target.
  artifactName: "MV-SQL-NLP-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MV SQL NLP
  installerLanguages: [es_ES, en_US, pt_BR]
  license: build/LICENSE.txt
  runAfterFinish: true
  artifactName: "MV-SQL-NLP-Setup-${version}.${ext}"

portable:
  artifactName: "MV-SQL-NLP-Portable-${version}.${ext}"

publish:
  provider: github
  owner: vieraschiavi
  repo: Mv-Sql
  # Sin esto, electron-builder crea el Release como borrador (draft) y no
  # aparece en la página pública de Releases hasta publicarlo a mano.
  releaseType: release
