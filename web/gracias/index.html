<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! — MV SQL NLP</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .box { max-width: 34rem; margin: 8rem auto; text-align: center; padding: 0 1.4rem; }
    .box h1 { font-size: 2rem; margin-bottom: 1rem; }
    .box p { color: var(--muted); margin-bottom: 1.5rem; }
    .spin { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--cyan);
            border-radius: 50%; margin: 2rem auto; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <div class="box">
    <div class="mv-logo" style="font-size:1.6rem;font-weight:800">⚡ MV SQL <span class="grad-text">NLP</span></div>
    <h1 id="title">Verificando tu pago…</h1>
    <p id="sub">Un segundo, confirmamos el pago con MercadoPago.</p>
    <div class="spin" id="spinner"></div>
    <div id="result"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const paymentId = params.get("payment_id") || params.get("collection_id");

    async function run() {
      const title = document.getElementById("title");
      const sub = document.getElementById("sub");
      const spinner = document.getElementById("spinner");
      const result = document.getElementById("result");

      if (!paymentId) {
        spinner.style.display = "none";
        title.textContent = "Falta el identificador de pago";
        sub.innerHTML = 'Volvé a <a href="/#download" style="color:#38bdf8">la página de compra</a> e intentá de nuevo.';
        return;
      }

      try {
        const r = await fetch(`/api/verify-and-issue?payment_id=${encodeURIComponent(paymentId)}`);
        const data = await r.json();
        spinner.style.display = "none";
        if (!r.ok) {
          title.textContent = "El pago está pendiente";
          sub.innerHTML = `<span class="err">${data.error || "Todavía no se acreditó."}</span><br>Refrescá esta página en unos segundos, o escribinos a vieraschiavi@gmail.com con tu comprobante.`;
          return;
        }
        title.textContent = "¡Pago confirmado! 🎉";
        const modoTxt = data.mode === "credits" ? "con créditos de IA embebidos" : "con tu propia IA (configurala en la app)";
        sub.textContent = `Tu descarga está lista, plan ${data.plan} ${modoTxt}.`;
        result.innerHTML = `
          <a class="btn btn-primary" href="/api/download?token=${encodeURIComponent(data.token)}">⬇ Descargar MV SQL NLP</a>
          <p style="color:var(--muted);font-size:.8rem;margin-top:1.2rem">
            Guardá este link — es tu licencia: <br>
            <code style="word-break:break-all">${location.origin}/api/download?token=${data.token}</code>
          </p>`;
      } catch (e) {
        spinner.style.display = "none";
        title.textContent = "No se pudo verificar el pago";
        sub.innerHTML = `<span class="err">${e.message}</span>`;
      }
    }
    run();
  </script>
</body>
</html>
